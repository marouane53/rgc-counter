name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev] build twine
      - run: env PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python main.py --version
      - run: python -m venv /tmp/rgc-counter-wheel
      - run: /tmp/rgc-counter-wheel/bin/pip install dist/*.whl
      - run: /tmp/rgc-counter-wheel/bin/rgc-counter --version
      - run: /tmp/rgc-counter-wheel/bin/rgc-counter --help
