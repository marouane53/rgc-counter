name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: env PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q
